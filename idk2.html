<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Roguelike Prototype Expanded</title>
<style>
body{margin:0;background:black;color:white;font-family:monospace;overflow:hidden}
#hud{position:absolute;left:10px;top:10px}
#minimap{position:absolute;right:10px;top:10px;border:1px solid white}
#saveBtn{position:absolute;right:10px;top:220px;font-size:10px;padding:4px}
</style>
</head>
<body>

<canvas id="game"></canvas>
<canvas id="minimap" width="200" height="200"></canvas>
<button id="saveBtn">SAVE</button>

<div id="hud">
HP <span id="hp"></span><br>
Gold <span id="gold"></span><br>
Mana <span id="mana"></span><br>
Weapon <span id="weapon"></span><br>
Enemies <span id="ec"></span><br>
Level <span id="lvl"></span>
</div>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

const minimap=document.getElementById("minimap")
const mctx=minimap.getContext("2d")

canvas.width=innerWidth
canvas.height=innerHeight

const W=canvas.width
const H=canvas.height

const MAP=64
let map=[]
let biome=[]

const BIOMES=[
{floor:"#2b3a67",wall:"#1b2540"},
{floor:"#3b5e2b",wall:"#243b1b"},
{floor:"#6b5b2b",wall:"#3f3517"},
{floor:"#4a2b5e",wall:"#2c1838"}
]

function gen(){

for(let y=0;y<MAP;y++){
map[y]=[]
biome[y]=[]
for(let x=0;x<MAP;x++){
map[y][x]=1
biome[y][x]=Math.floor(x/(MAP/4))
}
}

let rooms=[]

for(let r=0;r<20;r++){

let rw=4+Math.floor(Math.random()*6)
let rh=4+Math.floor(Math.random()*6)

let rx=2+Math.floor(Math.random()*(MAP-rw-2))
let ry=2+Math.floor(Math.random()*(MAP-rh-2))

for(let y=0;y<rh;y++)
for(let x=0;x<rw;x++)
map[ry+y][rx+x]=0

rooms.push({x:rx+rw/2,y:ry+rh/2})

}

for(let i=1;i<rooms.length;i++){

let a=rooms[i-1]
let b=rooms[i]

let x=a.x
let y=a.y

while(Math.floor(x)!=Math.floor(b.x)){
map[Math.floor(y)][Math.floor(x)]=0
x+=x<b.x?1:-1
}

while(Math.floor(y)!=Math.floor(b.y)){
map[Math.floor(y)][Math.floor(x)]=0
y+=y<b.y?1:-1
}

}

return rooms

}

let rooms=gen()

function safeSpawn(){
for(let r of rooms){
if(map[Math.floor(r.y)][Math.floor(r.x)]==0)return {x:r.x,y:r.y}
}
return {x:2,y:2}
}

let sp=safeSpawn()

let player={
x:sp.x,
y:sp.y,
a:0,
hp:40,
mana:10,
gold:0,
weapon:0
}

let weapons=[
{name:"Sword",d:1.3},
{name:"Axe",d:1.6},
{name:"Staff",d:4}
]

let enemies=[]
let bosses=[]
let items=[]
let projectiles=[]

let level=1
let kills=0

function spawnEnemy(x,y,hp=3){
enemies.push({x,y,hp,speed:0.015,type:"melee"})
}

function spawnMage(x,y){
enemies.push({x,y,hp:5,speed:0.02,mage:1,cool:0,type:"mage"})
}

function spawnBoss(x,y){
bosses.push({x,y,hp:6,speed:0.035,cool:0}) 
}

for(let i=2;i<rooms.length;i++){

let r=rooms[i]

if(Math.random()<0.25)spawnMage(r.x,r.y)
else spawnEnemy(r.x,r.y)

}

spawnBoss(rooms[rooms.length-1].x,rooms[rooms.length-1].y)

function spawnItem(x,y,mana){
items.push({x,y,mana})
}

let keys={}

addEventListener("keydown",e=>keys[e.key.toLowerCase()]=1)
addEventListener("keyup",e=>keys[e.key.toLowerCase()]=0)

/* REMOVIDO CONTROLE DE CAMERA PELO MOUSE */

addEventListener("click",attack)

document.getElementById("saveBtn").onclick=saveGame

function attack(){

let range=weapons[player.weapon].d

if(player.weapon==2 && player.mana>0){

projectiles.push({
x:player.x,
y:player.y,
dx:Math.cos(player.a)*0.25,
dy:Math.sin(player.a)*0.25,
circle:1,
size:1.2
})

player.mana--
return
}

for(let e of enemies){

let dx=e.x-player.x
let dy=e.y-player.y
let d=Math.hypot(dx,dy)

if(d<range)e.hp--

}

for(let b of bosses){

let dx=b.x-player.x
let dy=b.y-player.y
let d=Math.hypot(dx,dy)

if(d<range)b.hp--

}

}

let zbuf=new Array(W)

function ray(){

for(let x=0;x<W;x++){

let ra=player.a-0.5+x/W

let sin=Math.sin(ra)
let cos=Math.cos(ra)

let d=0
let hit=0

while(!hit && d<30){

d+=0.02

let rx=player.x+cos*d
let ry=player.y+sin*d

if(rx<0||ry<0||rx>=MAP||ry>=MAP){hit=1;break}

if(map[Math.floor(ry)][Math.floor(rx)]==1)hit=1

}

zbuf[x]=d

let bx=Math.floor(player.x+cos*d)
let by=Math.floor(player.y+sin*d)

let b=biome[by]?.[bx]??0
let col=BIOMES[b]

let h=H/d

ctx.fillStyle=col.wall
ctx.fillRect(x,H/2-h/2,1,h)

}

}

function drawSprites(list,color){

for(let s of list){

let dx=s.x-player.x
let dy=s.y-player.y

let dist=Math.hypot(dx,dy)

let ang=Math.atan2(dy,dx)-player.a

while(ang>Math.PI)ang-=Math.PI*2
while(ang<-Math.PI)ang+=Math.PI*2

if(Math.abs(ang)>1)continue

let size=200/dist
let sx=W/2+Math.tan(ang)*W/2

let left=Math.floor(sx-size/2)
let right=Math.floor(sx+size/2)

for(let x=left;x<right;x++){

if(x<0||x>=W)continue

if(dist<zbuf[x]){

if(s.circle){

ctx.beginPath()
ctx.fillStyle=color
ctx.arc(x,H/2,size*s.size/40,0,Math.PI*2)
ctx.fill()

}else{

ctx.fillStyle=color
ctx.fillRect(x,H/2-size/2,1,size)

}

}

}

}

}

function moveEntity(ent,dx,dy){

let nx=ent.x+dx
let ny=ent.y+dy

if(map[Math.floor(ent.y)][Math.floor(nx)]==0)ent.x=nx
if(map[Math.floor(ny)][Math.floor(ent.x)]==0)ent.y=ny

}

function update(){

let sp=0.07

let dx=Math.cos(player.a)
let dy=Math.sin(player.a)

if(keys["w"])moveEntity(player,dx*sp,dy*sp)
if(keys["s"])moveEntity(player,-dx*sp,-dy*sp)

if(keys["a"])player.a-=0.05
if(keys["d"])player.a+=0.05

if(keys["1"])player.weapon=0
if(keys["2"])player.weapon=1
if(keys["3"])player.weapon=2

for(let e of enemies){

let dx=player.x-e.x
let dy=player.y-e.y
let d=Math.hypot(dx,dy)

if(d>0.6){

moveEntity(e,dx/d*e.speed,dy/d*e.speed)

}else{

player.hp-=0.03

}

if(e.mage){

e.cool--

if(e.cool<=0){

let dd=Math.hypot(dx,dy)

projectiles.push({
x:e.x,
y:e.y,
dx:dx/dd*0.18,
dy:dy/dd*0.18,
circle:1,
enemy:1,
size:1.2
})

e.cool=120

}

}

if(e.hp<=0){

if(e.mage)spawnItem(e.x,e.y,1)
else spawnItem(e.x,e.y,0)

kills++

if(kills%5==0){

level++

for(let i=0;i<level;i++){
let r=rooms[Math.floor(Math.random()*rooms.length)]
spawnEnemy(r.x,r.y,3+level)
}

}

}

}

enemies=enemies.filter(e=>e.hp>0)

for(let b of bosses){

let dx=player.x-b.x
let dy=player.y-b.y
let d=Math.hypot(dx,dy)

moveEntity(b,dx/d*b.speed,dy/d*b.speed)

b.cool--

if(b.cool<=0){

projectiles.push({
x:b.x,
y:b.y,
dx:dx/d*0.25,
dy:dy/d*0.25,
circle:1,
enemy:1,
size:1.6
})

b.cool=60

}

if(b.hp<=0){
spawnItem(b.x,b.y,1)
kills+=2
}

}

bosses=bosses.filter(b=>b.hp>0)

for(let p of projectiles){

p.x+=p.dx
p.y+=p.dy

if(map[Math.floor(p.y)]?.[Math.floor(p.x)]==1)p.dead=1

if(p.enemy){

if(Math.hypot(player.x-p.x,player.y-p.y)<0.6){
player.hp-=1
p.dead=1
}

}else{

for(let e of enemies){
if(Math.hypot(e.x-p.x,e.y-p.y)<0.5){
e.hp-=3
p.dead=1
}
}

for(let b of bosses){
if(Math.hypot(b.x-p.x,b.y-p.y)<0.7){
b.hp-=4
p.dead=1
}
}

}

}

projectiles=projectiles.filter(p=>!p.dead)

for(let it of items){

if(Math.hypot(it.x-player.x,it.y-player.y)<0.7){

if(it.mana)player.mana+=3
else player.gold++

it.dead=1

}

}

items=items.filter(i=>!i.dead)

if(player.hp<=0){

localStorage.removeItem("rogueSave")
location.reload()

}

}

function saveGame(){

localStorage.setItem("rogueSave",JSON.stringify({
x:player.x,
y:player.y,
hp:player.hp,
gold:player.gold,
mana:player.mana,
level
}))

}

function minimapDraw(){

let s=minimap.width/MAP

mctx.fillStyle="black"
mctx.fillRect(0,0,minimap.width,minimap.height)

for(let y=0;y<MAP;y++)
for(let x=0;x<MAP;x++){

if(map[y][x]){
mctx.fillStyle="white"
mctx.fillRect(x*s,y*s,s,s)
}

}

mctx.fillStyle="red"
mctx.fillRect(player.x*s-2,player.y*s-2,4,4)

mctx.fillStyle="green"
for(let b of bosses)
mctx.fillRect(b.x*s-2,b.y*s-2,4,4)

}

function draw(){

let bob=0

if(keys["w"]||keys["s"])
bob=Math.sin(Date.now()*0.02)*5

ctx.setTransform(1,0,0,1,0,bob)

/* CÉU SEMPRE PRETO */
ctx.fillStyle="black"
ctx.fillRect(0,0,W,H/2)

let bx=Math.floor(player.x)
let by=Math.floor(player.y)
let b=biome[by]?.[bx]??0
ctx.fillStyle=BIOMES[b].floor
ctx.fillRect(0,H/2,W,H/2)

ray()

drawSprites(items,"yellow")

for(let e of enemies){

if(e.mage)drawSprites([e],"purple")
else drawSprites([e],"red")

}

drawSprites(projectiles,"cyan")
drawSprites(bosses,"green")

ctx.setTransform(1,0,0,1,0,0)

ctx.save()

let wbob=Math.sin(Date.now()*0.01)*6

ctx.translate(W-300,H-160+wbob)

/* ESPADA MELHOR */
if(player.weapon==0){

ctx.fillStyle="#ddd"
ctx.fillRect(-20,-120,12,100)

ctx.fillStyle="#999"
ctx.fillRect(-24,-20,20,10)

ctx.fillStyle="#663300"
ctx.fillRect(-18,-20,8,40)

}

/* MACHADO */
if(player.weapon==1){

ctx.fillStyle="#663300"
ctx.fillRect(-16,-110,10,110)

ctx.fillStyle="#bbb"
ctx.beginPath()
ctx.arc(-16,-80,30,1.5,4.7)
ctx.fill()

}

/* CAJADO */

if(player.weapon==2){

ctx.fillStyle="#5b3a9c"
ctx.fillRect(-12,-130,8,130)

ctx.fillStyle="cyan"
ctx.beginPath()
ctx.arc(-8,-140,12,0,Math.PI*2)
ctx.fill()

}

ctx.restore()

document.getElementById("hp").textContent=Math.floor(player.hp)
document.getElementById("mana").textContent=player.mana
document.getElementById("gold").textContent=player.gold
document.getElementById("weapon").textContent=weapons[player.weapon].name
document.getElementById("ec").textContent=enemies.length
document.getElementById("lvl").textContent=level

minimapDraw()

}

function loop(){
update()
draw()
requestAnimationFrame(loop)
}

let save=localStorage.getItem("rogueSave")

if(save){

let s=JSON.parse(save)

player.x=s.x
player.y=s.y
player.hp=s.hp
player.gold=s.gold
player.mana=s.mana
level=s.level||1

}

loop()

</script>
</body>
</html>
